- name: Task variables
  hosts: local
  connection: local # ansible is connecting to localhost
  vars:  #play vars
    COURSE: Devops
    DURATION: 120 hrs
    TRAINER: Shiva kumar
  tasks:
  - name: print the course info
    vars: # Tak variables ,perferance is here
      COURSE: Azure
    ansible.builtin.debug:
      msg: "Course name is:{{ COURSE }} Duration is: {{ DURATION }} Trainer is: {{ TRAINER}}"
