- name: variable preferance
  hosts: local
  connection: local
  vars:
    NAME: from play level
  vars_files:
  - course.yaml
  vars_prompt:
  - name: NAME
    prompt: what is your NAME?
    private: false
  tasks:
  - name: test preferance
    vars:
      NAME: From Task level
    ansible.builtin.debug:
      msg: "name is: {{ NAME }}"
  